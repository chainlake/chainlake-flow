apiVersion: batch/v1
kind: Job
metadata:
  name: rpcstream-dlq-replay
  namespace: ingestion
  labels:
    app: rpcstream-dlq-replay
    chain: bsc
    pipeline: bsc_mainnet_ingestion
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: rpcstream-dlq-replay
        chain: bsc
        pipeline: bsc_mainnet_ingestion
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 5
      containers:
        - name: rpcstream-dlq-replay
          image: rpcstream:dev
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - rpcstream.dlq_replay
            - --entity
            - transaction
            - --status
            - failed
          env:
            - name: PIPELINE_CONFIG
              value: /config/pipeline.yaml

            - name: DLQ_REPLAY_GROUP_ID
              value: rpcstream-dlq-replay-manual

            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid

            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: KAFKA_USERNAME

            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: KAFKA_PASSWORD

            - name: KAFKA_CA_PATH
              value: /etc/ssl/certs/ca.pem

            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: KAFKA_BOOTSTRAP_SERVERS

            - name: KAFAK_SCHEMA_REGISTRY
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: KAFAK_SCHEMA_REGISTRY

          volumeMounts:
            - name: config-volume
              mountPath: /config
            - name: kafka-ca-volume
              mountPath: /etc/ssl/certs

          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      volumes:
        - name: config-volume
          configMap:
            name: rpcstream-dlq

        - name: kafka-ca-volume
          secret:
            secretName: kafka-ca-secret
