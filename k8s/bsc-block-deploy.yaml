apiVersion: apps/v1
kind: Deployment
metadata:
  name: bsc-block-transaction
  namespace: ingestion
  labels:
    chain: bsc
    pipeline: block
  annotations:
    reloader.stakater.com/auto: "true"
    
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      chain: bsc
      pipeline: block
  template:
    metadata:
      labels:
        chain: bsc
        pipeline: block
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 1
      containers:
        - name: ingestion-pipeline
          image: rpcstream:dev
          imagePullPolicy: IfNotPresent

          # -----------------------------
          # Ingest runtime variables
          # -----------------------------
          env:
            - name: PIPELINE_CONFIG
              value: /config/pipeline.yaml

            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid

            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          volumeMounts:
            - name: config-volume
              mountPath: /config

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

      volumes:
        - name: config-volume
          configMap:
            name: bsc-block-config